<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LeaveOS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:sans-serif;
background:#f7f5f2;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:12px;
width:340px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:14px;
border-radius:6px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
border:none;
background:#4a7c59;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:disabled{
opacity:0.6;
}

#otpBox{
display:none;
}

#app{
display:none;
text-align:center;
}

</style>

</head>
<body>


<!-- LOGIN -->
<div class="card" id="login">

<h2>LeaveOS Login</h2>

<input id="email" placeholder="your@email.com">

<button onclick="sendOTP()" id="sendBtn">
Send Email Code
</button>

<div id="otpBox">

<input id="otp" placeholder="Enter 6 digit code">

<button onclick="verifyOTP()" id="verifyBtn">
Verify
</button>

</div>

<p id="msg"></p>

</div>


<!-- APP -->
<div id="app">

<h2>Welcome to LeaveOS</h2>

<p id="userEmail"></p>

<button onclick="logout()">Logout</button>

</div>


<script>


// SUPABASE CONFIG
const SUPABASE_URL="https://zmbethwexdcqpvqhescl.supabase.co"

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptYmV0aHdleGRjcXB2cWhlc2NsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDg4ODMsImV4cCI6MjA4ODk4NDg4M30.Rgc__vK63tYyAqf2GzFKAAwJt_s1YoEwIlz4ztc_UE8"


let sbClient=null
let loginEmail=""


// INIT
document.addEventListener("DOMContentLoaded",async()=>{

sbClient=window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

const {data:{session}}=await sbClient.auth.getSession()

if(session){
showApp(session.user)
}

sbClient.auth.onAuthStateChange((event,session)=>{

if(event==="SIGNED_IN"){
showApp(session.user)
}

if(event==="SIGNED_OUT"){
showLogin()
}

})

})


async function sendOTP() {

  const email = document.getElementById("phone-input").value.trim();

  if (!email || !email.includes("@")) {
    showLoginError("phone-error", "Please enter a valid email address");
    return;
  }

  phoneNumber = email;

  document.getElementById("phone-display").textContent = email;

  const btn = document.getElementById("send-otp-btn");

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Sending...';

  hideLoginError("phone-error");

  try {

    const { data, error } = await supabase.auth.signInWithOtp({
      email: email,
      options: {
        shouldCreateUser: false
      }
    });

    if (error) throw error;

    document.getElementById("step-phone").classList.remove("active");
    document.getElementById("step-otp").classList.add("active");

    setTimeout(() => {
      document.querySelector(".otp-input").focus();
    }, 100);

  } catch (err) {

    showLoginError("phone-error", err.message || "Failed to send code");

    btn.disabled = false;
    btn.innerHTML = "Send Email Code";

  }

}

// VERIFY OTP
async function verifyOTP() {

  const inputs = document.querySelectorAll(".otp-input");

  const code = [...inputs].map(i => i.value).join("");

  if (code.length < 6) return;

  const btn = document.getElementById("verify-btn");

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Verifying...';

  hideLoginError("otp-error");

  try {

    const { data, error } = await supabase.auth.verifyOtp({
      email: phoneNumber,
      token: code,
      type: "email"
    });

    if (error) throw error;

  } catch (err) {

    showLoginError("otp-error", err.message || "Invalid code");

    btn.disabled = false;
    btn.innerHTML = "Verify & Sign In";

    inputs.forEach(i => i.value = "");

    inputs[0].focus();

  }

}

// SHOW APP
function showApp(user){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("userEmail").innerText=user.email

}


// SHOW LOGIN
function showLogin(){

document.getElementById("login").style.display="block"
document.getElementById("app").style.display="none"

}


// LOGOUT
async function logout(){

await sbClient.auth.signOut()

}


// MESSAGE
function showMsg(text){

document.getElementById("msg").innerText=text

}


</script>

</body>
</html>
