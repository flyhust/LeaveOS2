<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>LeaveOS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:sans-serif;
background:#f7f5f2;
margin:0;
}

header{
background:#4a7c59;
color:white;
padding:15px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

button{
padding:10px 16px;
border:none;
background:#4a7c59;
color:white;
border-radius:6px;
cursor:pointer;
}

input,select{
padding:8px;
width:100%;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:8px;
border-bottom:1px solid #eee;
}

</style>

</head>
<body>

<header>

LeaveOS

<span style="float:right">

<span id="userEmail"></span>

<button onclick="logout()">Logout</button>

</span>

</header>


<div class="container">

<!-- LOGIN -->
<div id="login" class="card">

<h2>Login</h2>

<input id="email" placeholder="email">

<button onclick="sendOTP()">Send Code</button>

<input id="otp" placeholder="OTP code">

<button onclick="verifyOTP()">Verify</button>

<p id="msg"></p>

</div>


<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<div class="card">

<h3>Leave Balance</h3>

<div id="balances"></div>

</div>


<div class="card">

<h3>Apply Leave</h3>

<select id="leaveType"></select>

<input type="date" id="startDate">

<input type="date" id="endDate">

<textarea id="reason" placeholder="Reason"></textarea>

<button onclick="applyLeave()">Submit</button>

</div>


<div class="card">

<h3>My Requests</h3>

<table>

<thead>

<tr>

<th>Type</th>
<th>Start</th>
<th>End</th>
<th>Status</th>

</tr>

</thead>

<tbody id="requests"></tbody>

</table>

</div>


<div class="card" id="managerPanel" style="display:none">

<h3>Manager Approval</h3>

<table>

<thead>

<tr>

<th>Employee</th>
<th>Type</th>
<th>Dates</th>
<th>Action</th>

</tr>

</thead>

<tbody id="approvalList"></tbody>

</table>

</div>


</div>

</div>



<script>

const SUPABASE_URL="https://zmbethwexdcqpvqhescl.supabase.co"

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptYmV0aHdleGRjcXB2cWhlc2NsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDg4ODMsImV4cCI6MjA4ODk4NDg4M30.Rgc__vK63tYyAqf2GzFKAAwJt_s1YoEwIlz4ztc_UE8"

const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let currentUser=null
let employee=null


async function sendOTP(){

const email=document.getElementById("email").value

const {error}=await sb.auth.signInWithOtp({email})

if(error){
msg(error.message)
}else{
msg("Check email")
}

}


async function verifyOTP(){

const code=document.getElementById("otp").value
const email=document.getElementById("email").value

const {error}=await sb.auth.verifyOtp({
email,
token:code,
type:"email"
})

if(error) msg(error.message)

}


async function init(){

const {data:{session}}=await sb.auth.getSession()

if(!session) return

currentUser=session.user

document.getElementById("login").style.display="none"
document.getElementById("dashboard").style.display="block"

document.getElementById("userEmail").innerText=currentUser.email

await loadEmployee()
await loadBalances()
await loadLeaveTypes()
await loadRequests()
await loadApprovals()

}


async function loadEmployee(){

let {data}=await sb
.from("employees")
.select("*")
.eq("email",currentUser.email)
.single()

if(!data){

await sb.from("employees").insert({
email:currentUser.email,
full_name:currentUser.email,
role:"employee"
})

data=(await sb.from("employees")
.select("*")
.eq("email",currentUser.email)
.single()).data

}

employee=data

if(employee.role!=="employee"){
document.getElementById("managerPanel").style.display="block"
}

}


async function loadBalances(){

const {data}=await sb
.from("leave_balances")
.select(`
entitled_days,
used_days,
leave_types(name)
`)
.eq("employee_id",employee.id)

let html=""

data.forEach(b=>{

html+=`
<div>
${b.leave_types.name} :
${b.entitled_days-b.used_days} days
</div>
`

})

document.getElementById("balances").innerHTML=html

}


async function loadLeaveTypes(){

const {data}=await sb
.from("leave_types")
.select("*")

let html=""

data.forEach(t=>{

html+=`<option value="${t.id}">${t.name}</option>`

})

document.getElementById("leaveType").innerHTML=html

}


async function applyLeave(){

const leave_type_id=document.getElementById("leaveType").value
const start_date=document.getElementById("startDate").value
const end_date=document.getElementById("endDate").value
const reason=document.getElementById("reason").value

await sb.from("leave_requests").insert({

employee_id:employee.id,
leave_type_id,
start_date,
end_date,
days_requested:1,
reason

})

loadRequests()

}


async function loadRequests(){

const {data}=await sb
.from("leave_requests")
.select(`
status,
start_date,
end_date,
leave_types(name)
`)
.eq("employee_id",employee.id)

let html=""

data.forEach(r=>{

html+=`
<tr>

<td>${r.leave_types.name}</td>
<td>${r.start_date}</td>
<td>${r.end_date}</td>
<td>${r.status}</td>

</tr>
`

})

document.getElementById("requests").innerHTML=html

}


async function loadApprovals(){

const {data}=await sb
.from("leave_requests")
.select(`
id,
start_date,
end_date,
employees(full_name),
leave_types(name)
`)
.eq("status","pending")

let html=""

data.forEach(r=>{

html+=`
<tr>

<td>${r.employees.full_name}</td>
<td>${r.leave_types.name}</td>
<td>${r.start_date} → ${r.end_date}</td>

<td>

<button onclick="approve('${r.id}')">
Approve
</button>

<button onclick="reject('${r.id}')">
Reject
</button>

</td>

</tr>
`

})

document.getElementById("approvalList").innerHTML=html

}


async function approve(id){

await sb
.from("leave_requests")
.update({status:"approved"})
.eq("id",id)

loadApprovals()

}


async function reject(id){

await sb
.from("leave_requests")
.update({status:"rejected"})
.eq("id",id)

loadApprovals()

}


async function logout(){
await sb.auth.signOut()
location.reload()
}


function msg(t){
document.getElementById("msg").innerText=t
}


init()

</script>

</body>
</html>
